<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>무드애드 | 상세페이지</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #0b0f14;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Pretendard", "Noto Sans KR", sans-serif;
      color: #ffffff;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .top-area {
      width: 100%;
      background: linear-gradient(180deg, #0b0f14 0%, #101720 100%);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 28px 20px 40px;
    }

    .top-inner {
      width: 100%;
      max-width: 980px;
      margin: 0 auto;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 18px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      color: #ffffff;
      font-weight: 700;
      font-size: 15px;
      transition: 0.2s ease;
    }

    .back-btn:hover {
      background: rgba(255,255,255,0.1);
    }

    .top-title {
      margin: 24px 0 10px;
      font-size: clamp(28px, 5vw, 44px);
      line-height: 1.15;
      letter-spacing: -0.04em;
      font-weight: 800;
    }

    .top-desc {
      margin: 0;
      color: rgba(255,255,255,0.72);
      font-size: 16px;
      line-height: 1.7;
    }

    .detail-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 40px 16px 80px;
      background: #f5f5f5;
    }

    .detail-img {
      width: 100%;
      max-width: 860px;
      height: auto;
      display: block;
      box-shadow: 0 24px 60px rgba(0,0,0,0.18);
      border-radius: 6px;
    }

    @media (max-width: 768px) {
      .top-area {
        padding: 20px 16px 28px;
      }

      .detail-wrap {
        padding: 24px 10px 50px;
      }

      .back-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <section class="top-area">
    <div class="top-inner">
      <a href="index.html" class="back-btn">← 메인페이지로 돌아가기</a>
      <h1 class="top-title">상세페이지</h1>
      <p class="top-desc">
        무드애드의 서비스 소개 내용을 한눈에 볼 수 있도록 정리한 페이지입니다.
        아래에서 상세 내용을 확인하실 수 있습니다.
      </p>
    </div>
  </section>

  <div class="detail-wrap">
    <img src="moodad_detailpage_merged.jpg" alt="무드애드 상세페이지" class="detail-img" />
  </div>
</body>
</html>
