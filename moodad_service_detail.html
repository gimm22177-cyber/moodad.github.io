<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>무드애드 | 상세페이지</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Pretendard", "Noto Sans KR", sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .top-shell {
      background:
        radial-gradient(circle at top left, rgba(76, 111, 112, 0.28), transparent 26%),
        linear-gradient(180deg, #0c1117 0%, #121922 100%);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 22px 20px 34px;
    }

    .top-inner {
      width: 100%;
      max-width: 1080px;
      margin: 0 auto;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 14px 0 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .brand-logo {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.16);
      box-shadow: 0 10px 30px rgba(0,0,0,0.22);
      background: rgba(255,255,255,0.08);
    }

    .brand-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .brand-text-wrap {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .brand-name {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.04em;
      color: #ffffff;
      line-height: 1.1;
    }

    .brand-sub {
      font-size: 13px;
      color: rgba(255,255,255,0.58);
      letter-spacing: -0.02em;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .ghost-btn,
    .primary-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 20px;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 700;
      transition: 0.2s ease;
      white-space: nowrap;
    }

    .ghost-btn {
      color: #ffffff;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.05);
    }

    .ghost-btn:hover {
      background: rgba(255,255,255,0.10);
    }

    .primary-btn {
      color: #ffffff;
      background: linear-gradient(180deg, #45836f 0%, #2f6b57 100%);
      box-shadow: 0 14px 34px rgba(47,107,87,0.26);
    }

    .primary-btn:hover {
      transform: translateY(-1px);
    }

    .hero-box {
      padding: 20px 0 8px;
    }

    .hero-title {
      margin: 0 0 12px;
      font-size: clamp(30px, 5vw, 48px);
      line-height: 1.12;
      letter-spacing: -0.05em;
      color: #ffffff;
      font-weight: 800;
    }

    .hero-desc {
      margin: 0;
      max-width: 760px;
      font-size: 16px;
      line-height: 1.75;
      color: rgba(255,255,255,0.72);
    }

    .detail-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 44px 16px 90px;
      background: #f3f4f6;
    }

    .detail-img {
      width: 100%;
      max-width: 860px;
      height: auto;
      display: block;
      border-radius: 10px;
      box-shadow: 0 26px 70px rgba(15, 23, 42, 0.16);
    }

    @media (max-width: 768px) {
      .top-shell {
        padding: 18px 14px 26px;
      }

      .top-bar {
        flex-direction: column;
        align-items: flex-start;
        gap: 18px;
        padding-bottom: 18px;
      }

      .top-actions {
        width: 100%;
        justify-content: stretch;
        flex-direction: column;
      }

      .ghost-btn,
      .primary-btn {
        width: 100%;
      }

      .brand-name {
        font-size: 21px;
      }

      .brand-logo {
        width: 52px;
        height: 52px;
      }

      .detail-wrap {
        padding: 24px 8px 50px;
      }

      .hero-desc {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <section class="top-shell">
    <div class="top-inner">
      <div class="top-bar">
        <div class="brand">
          <div class="brand-logo">
            <img src="moodad_logo.jpg" alt="무드애드 로고" />
          </div>
          <div class="brand-text-wrap">
            <div class="brand-name">무드애드</div>
            <div class="brand-sub">플레이스 마케팅 · 브랜드 블로그</div>
          </div>
        </div>

        <div class="top-actions">
          <a href="index.html" class="ghost-btn">메인으로</a>
          <a href="index.html#contact" class="primary-btn">문의하기</a>
        </div>
      </div>

      <div class="hero-box">
        <h1 class="hero-title">상세페이지</h1>
        <p class="hero-desc">
          무드애드의 서비스 소개 내용을 한눈에 확인할 수 있도록 정리한 페이지입니다.
          아래에서 상세 내용을 확인하시고, 필요하시면 메인페이지에서 바로 문의까지 이어가실 수 있습니다.
        </p>
      </div>
    </div>
  </section>

  <div class="detail-wrap">
    <img src="moodad_detailpage_merged.jpg" alt="무드애드 상세페이지" class="detail-img" />
  </div>
</body>
</html>
