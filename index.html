<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>무드애드 | 대표님, 원하시는 매출이 있으신가요?</title>
  <meta name="description" content="대표님, 원하시는 매출이 있으신가요? 무드애드 상세페이지입니다." />

  <link rel="preload" as="image" href="1.jpg" />

  <script>
    document.documentElement.classList.add('js');
  </script>

  <style>
    * { box-sizing: border-box; }

    :root {
      --navy: #183143;
      --navy-soft: #405766;
      --text-dark: #1e2f3c;
      --white: #ffffff;

      --bg-main: linear-gradient(180deg, #f6fbfd 0%, #eef5f8 100%);
      --top-grad: linear-gradient(135deg, #eef8fb 0%, #dceef3 40%, #e9f1fb 100%);
      --contact-grad: linear-gradient(135deg, #ebf8fb 0%, #deeff4 46%, #eaf1fb 100%);

      --accent-grad: linear-gradient(135deg, #7db7b5 0%, #82accf 48%, #8d9fd9 100%);
      --accent-shadow: 0 16px 38px rgba(108, 149, 180, 0.24);

      --glass-bg: linear-gradient(180deg, rgba(255,255,255,0.9), rgba(255,255,255,0.76));
      --glass-shadow: 0 12px 30px rgba(77, 101, 118, 0.10);

      --shadow-soft: 0 18px 52px rgba(50, 79, 104, 0.10);
      --shadow-card: 0 18px 48px rgba(44, 72, 94, 0.10);

      --radius-card: 34px;
      --radius-btn: 18px;

      --max: 1120px;
    }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Pretendard", "Noto Sans KR", sans-serif;
      background: var(--bg-main);
      color: var(--text-dark);
      line-height: 1.6;
      letter-spacing: -0.02em;
      overflow-x: hidden;
      padding-bottom: 96px;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .container {
      width: min(calc(100% - 40px), var(--max));
      margin: 0 auto;
    }

    .top-shell {
      position: relative;
      overflow: hidden;
      background: var(--top-grad);
      border-bottom: 1px solid rgba(255,255,255,0.45);
    }

    .top-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top left, rgba(145, 204, 214, 0.30), transparent 24%),
        radial-gradient(circle at top right, rgba(155, 191, 228, 0.24), transparent 22%),
        radial-gradient(circle at bottom center, rgba(255,255,255,0.40), transparent 30%);
      pointer-events: none;
    }

    .top-inner {
      position: relative;
      z-index: 1;
      padding: 26px 0 56px;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 4px 0 36px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .brand-logo-box {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      border-radius: 24px;
      background: rgba(255,255,255,0.56);
      border: 1px solid rgba(255,255,255,0.72);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(12px);
    }

    .brand-logo {
      display: block;
      height: 66px;
      width: auto;
      max-width: 100%;
      object-fit: contain;
      border-radius: 16px;
    }

    .top-actions,
    .contact-actions {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .top-actions {
      justify-content: flex-end;
    }

    .premium-btn {
      position: relative;
      overflow: hidden;
      isolation: isolate;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      min-height: 58px;
      padding: 0 26px;
      border-radius: var(--radius-btn);
      border: 1px solid transparent;
      font-size: 16px;
      font-weight: 900;
      letter-spacing: -0.03em;
      transition:
        transform 0.28s cubic-bezier(.2,.8,.2,1),
        box-shadow 0.28s cubic-bezier(.2,.8,.2,1),
        border-color 0.28s ease,
        background 0.28s ease,
        color 0.28s ease;
      white-space: nowrap;
      cursor: pointer;
      backface-visibility: hidden;
    }

    .premium-btn::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        115deg,
        transparent 18%,
        rgba(255,255,255,0.22) 42%,
        rgba(255,255,255,0.55) 50%,
        rgba(255,255,255,0.18) 58%,
        transparent 82%
      );
      transform: translateX(-130%);
      transition: transform 0.75s cubic-bezier(.2,.8,.2,1);
      z-index: -1;
      pointer-events: none;
    }

    .premium-btn::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.35);
      pointer-events: none;
      z-index: 1;
    }

    .premium-btn:hover {
      transform: translateY(-4px);
    }

    .premium-btn:hover::before {
      transform: translateX(140%);
    }

    .premium-btn .btn-label,
    .premium-btn .btn-icon {
      position: relative;
      z-index: 2;
    }

    .premium-btn .btn-icon {
      font-size: 15px;
      transition: transform 0.28s cubic-bezier(.2,.8,.2,1);
    }

    .premium-btn:hover .btn-icon {
      transform: translateX(4px);
    }

    .premium-btn--glass {
      color: var(--navy);
      background: var(--glass-bg);
      border-color: rgba(255,255,255,0.84);
      box-shadow: var(--glass-shadow);
    }

    .premium-btn--accent {
      color: #ffffff;
      background: var(--accent-grad);
      border-color: rgba(255,255,255,0.24);
      box-shadow: var(--accent-shadow);
    }

    .premium-btn--large {
      min-height: 62px;
      padding: 0 30px;
      font-size: 17px;
    }

    .hero-copy {
      padding: 10px 0 0;
    }

    .hero-title {
      margin: 0;
      font-size: clamp(40px, 6vw, 78px);
      line-height: 1.06;
      font-weight: 900;
      letter-spacing: -0.06em;
      color: var(--navy);
      word-break: keep-all;
    }

    .hero-sub {
      margin: 30px 0 0;
      max-width: 860px;
      font-size: clamp(22px, 3vw, 34px);
      line-height: 1.7;
      color: #787878;
      font-weight: 600;
      word-break: keep-all;
    }

    .hero-note {
      margin: 18px 0 0;
      max-width: 720px;
      font-size: clamp(18px, 2.2vw, 26px);
      line-height: 1.65;
      color: var(--navy);
      font-weight: 800;
      word-break: keep-all;
    }

    .detail-section {
      padding: 46px 0 0;
    }

    .detail-stack {
      max-width: 720px;
      margin: 0 auto;
      display: grid;
      gap: 22px;
    }

    .detail-card {
      background: #ffffff;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(218, 230, 236, 0.9);
      box-shadow: var(--shadow-card);
      transition:
        transform 0.35s ease,
        box-shadow 0.35s ease;
      transform-origin: center center;
      will-change: transform, opacity, filter;
    }

    .detail-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 24px 58px rgba(44, 72, 94, 0.13);
    }

    .detail-card img {
      width: 100%;
      display: block;
      height: auto;
    }

    .contact-bridge {
      padding: 58px 0 94px;
    }

    .contact-card {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      border-radius: var(--radius-card);
      overflow: hidden;
      background: var(--contact-grad);
      border: 1px solid rgba(255,255,255,0.75);
      box-shadow: var(--shadow-card);
      position: relative;
    }

    .contact-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.42), transparent 22%),
        radial-gradient(circle at bottom right, rgba(131, 176, 214, 0.14), transparent 24%);
      pointer-events: none;
    }

    .contact-card-inner {
      position: relative;
      z-index: 1;
      padding: 46px 40px;
    }

    .contact-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: #6b8190;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .contact-eyebrow::before {
      content: "";
      width: 34px;
      height: 1px;
      background: rgba(107, 129, 144, 0.45);
    }

    .contact-title {
      margin: 18px 0 8px;
      font-size: 48px;
      line-height: 1.08;
      letter-spacing: -0.055em;
      font-weight: 900;
      color: var(--navy);
      word-break: keep-all;
    }

    .contact-desc {
      margin: 0;
      max-width: 760px;
      color: var(--navy-soft);
      font-size: 18px;
      line-height: 1.9;
      word-break: keep-all;
    }

    .contact-actions {
      margin-top: 34px;
    }

    .contact-note {
      margin-top: 18px;
      font-size: 14px;
      color: #6f8291;
      line-height: 1.8;
      word-break: keep-all;
    }

    .contact-desc-top {
      margin-top: 10px;
    }

    .contact-desc-gap {
      margin-top: 10px;
    }

    .contact-warning {
      color: #e53935;
    }

    .floating-consult-bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 2000;
      padding: 10px 18px calc(10px + env(safe-area-inset-bottom));
      background: linear-gradient(
        135deg,
        rgba(125, 183, 181, 0.96) 0%,
        rgba(130, 172, 207, 0.96) 48%,
        rgba(141, 159, 217, 0.96) 100%
      );
      border-top: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 -12px 28px rgba(36, 58, 78, 0.18);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .floating-consult-inner {
      width: min(calc(100% - 12px), 1500px);
      margin: 0 auto;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 16px;
      align-items: center;
    }

    .floating-consult-title {
      margin: 0;
      color: #ffffff;
      font-size: clamp(20px, 1.8vw, 26px);
      line-height: 1;
      font-weight: 900;
      letter-spacing: -0.04em;
      white-space: nowrap;
      text-shadow: 0 2px 10px rgba(16, 32, 49, 0.15);
    }

    .floating-consult-form {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 0.7fr;
      gap: 10px;
      align-items: center;
    }

    .floating-consult-input {
      width: 100%;
      height: 40px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 999px;
      padding: 0 14px;
      font-size: 14px;
      color: #ffffff;
      background: rgba(255, 255, 255, 0.14);
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.14);
      transition: border-color 0.2s ease, background 0.2s ease;
    }

    .floating-consult-input::placeholder {
      color: rgba(255, 255, 255, 0.78);
      opacity: 1;
    }

    .floating-consult-btn {
      position: relative;
      width: 100%;
      height: 40px;
      padding: 0 14px;
      border: 0;
      border-radius: 999px;
      color: #ffffff;
      font-size: 15px;
      font-weight: 900;
      letter-spacing: -0.03em;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      isolation: isolate;
      transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
      background:
        radial-gradient(
          circle at center,
          rgba(255, 196, 220, 0.95) 0%,
          rgba(255, 186, 214, 0.55) 18%,
          rgba(255, 176, 208, 0.22) 38%,
          rgba(255, 176, 208, 0) 62%
        ) center / 0 0 no-repeat,
        rgba(255, 255, 255, 0.22);
      box-shadow:
        0 8px 18px rgba(26, 43, 62, 0.14),
        0 0 0 rgba(255, 182, 214, 0);
      animation: consultPulsePink 3.2s ease-out infinite;
    }

    .floating-consult-btn:hover {
      transform: translateY(-1px);
      background:
        radial-gradient(
          circle at center,
          rgba(255, 202, 224, 1) 0%,
          rgba(255, 190, 216, 0.62) 18%,
          rgba(255, 178, 210, 0.24) 38%,
          rgba(255, 178, 210, 0) 62%
        ) center / 220px 220px no-repeat,
        rgba(255, 255, 255, 0.26);
    }

    .floating-consult-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
      animation: none;
    }

    .floating-consult-btn::before,
    .floating-consult-btn::after {
      content: "";
      position: absolute;
      inset: -10px;
      border-radius: 999px;
      pointer-events: none;
    }

    .floating-consult-btn::before {
      border: 2px solid rgba(255, 196, 220, 0.55);
      opacity: 0;
      animation: consultRingPink 3.2s ease-out infinite;
    }

    .floating-consult-btn::after {
      border: 2px solid rgba(255, 186, 214, 0.32);
      opacity: 0;
      animation: consultRingPink 3.2s ease-out 1.6s infinite;
    }

    .floating-consult-btn:disabled::before,
    .floating-consult-btn:disabled::after {
      animation: none;
    }

    @keyframes consultPulsePink {
      0% {
        background-size: 0 0, auto;
        box-shadow:
          0 8px 18px rgba(26, 43, 62, 0.14),
          0 0 0 rgba(255, 182, 214, 0);
      }
      20% { background-size: 64px 64px, auto; }
      55% {
        background-size: 145px 145px, auto;
        box-shadow:
          0 10px 24px rgba(26, 43, 62, 0.18),
          0 0 28px rgba(255, 186, 214, 0.35);
      }
      100% {
        background-size: 250px 250px, auto;
        box-shadow:
          0 8px 18px rgba(26, 43, 62, 0.14),
          0 0 0 rgba(255, 182, 214, 0);
      }
    }

    @keyframes consultRingPink {
      0% {
        transform: scale(0.9);
        opacity: 0;
      }
      20% { opacity: 0.55; }
      60% { opacity: 0.22; }
      100% {
        transform: scale(1.26);
        opacity: 0;
      }
    }

    .floating-consult-status {
      width: min(calc(100% - 12px), 1500px);
      margin: 4px auto 0;
      color: rgba(255, 255, 255, 0.92);
      font-size: 12px;
      line-height: 1.4;
      letter-spacing: -0.02em;
    }

    .floating-consult-status:empty {
      display: none;
    }

    .reveal {
      opacity: 1;
      transform: none;
      filter: none;
    }

    .js .reveal {
      opacity: 0;
      transition:
        opacity 1.28s cubic-bezier(.22,.61,.36,1),
        transform 1.28s cubic-bezier(.22,.61,.36,1),
        filter 1.28s cubic-bezier(.22,.61,.36,1);
      will-change: opacity, transform, filter;
    }

    .js .reveal.visible {
      opacity: 1;
      transform: translate3d(0,0,0) scale(1) rotate(0deg);
      filter: blur(0) brightness(1);
    }

    /* 2,3,4,5 왼쪽→오른쪽 더 길게 */
    .js .detail-card-2,
    .js .detail-card-3,
    .js .detail-card-4,
    .js .detail-card-5 {
      transform: translateX(-150px);
      filter: blur(0);
    }

    /* 6 아래→위 조금 천천히 더 길게 */
    .js .detail-card-6 {
      transform: translateY(130px);
      filter: blur(0);
      transition-duration: 1.5s;
    }

    /* 7 살짝 튕기기 더 크게 */
    .js .detail-card-7 {
      transform: translateY(84px) scale(0.90);
      filter: blur(0);
    }
    .js .detail-card-7.visible {
      animation: popBounceOnce 1.15s cubic-bezier(.22,.61,.36,1);
    }

    /* 8 흐렸다가 선명해지기 강화 */
    .js .detail-card-8 {
      transform: scale(0.96);
      filter: blur(20px) brightness(1.18);
    }

    /* 9 아래→위 */
    .js .detail-card-9 {
      transform: translateY(120px);
      filter: blur(0);
    }

    /* 10 점점 커지기 */
    .js .detail-card-10 {
      transform: scale(0.74);
      filter: blur(0);
    }

    /* 11 아래→위 */
    .js .detail-card-11 {
      transform: translateY(120px);
      filter: blur(0);
    }

    /* 12 아래→위 */
    .js .detail-card-12 {
      transform: translateY(120px);
      filter: blur(0);
    }

    /* 13 왼쪽→오른쪽 */
    .js .detail-card-13 {
      transform: translateX(-150px);
      filter: blur(0);
    }

    /* 14 아래→위 */
    .js .detail-card-14 {
      transform: translateY(120px);
      filter: blur(0);
    }

    /* 15 점점 커지면서 밝아지기 */
    .js .detail-card-15 {
      transform: scale(0.74);
      filter: brightness(1.42) blur(6px);
    }

    /* 16 오른쪽→왼쪽 */
    .js .detail-card-16 {
      transform: translateX(150px);
      filter: blur(0);
    }

    @keyframes popBounceOnce {
      0%   { transform: translateY(84px) scale(0.90); opacity: 0; }
      50%  { transform: translateY(-12px) scale(1.05); opacity: 1; }
      72%  { transform: translateY(6px) scale(0.985); opacity: 1; }
      100% { transform: translateY(0) scale(1); opacity: 1; }
    }

    .blossom-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 999;
    }

    .blossom-petal {
      position: absolute;
      top: -12vh;
      left: 0;
      width: var(--petal-size);
      height: calc(var(--petal-size) * 0.72);
      opacity: var(--petal-opacity);
      will-change: transform, opacity;
      animation: blossom-fall var(--fall-duration) linear var(--fall-delay) forwards;
    }

    .blossom-shape {
      position: relative;
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 78% 22% 75% 25%;
      background:
        radial-gradient(circle at 32% 30%, rgba(255,255,255,0.92) 0 14%, rgba(255,228,238,0.95) 15% 30%, rgba(255,199,218,0.94) 31% 70%, rgba(245,153,185,0.92) 71% 100%);
      box-shadow:
        0 0 10px rgba(255, 186, 208, 0.22),
        inset -2px -2px 4px rgba(230, 120, 165, 0.18);
      animation:
        blossom-spin var(--spin-duration) linear infinite,
        blossom-sway var(--sway-duration) ease-in-out infinite alternate;
      transform-origin: center center;
    }

    .blossom-shape::after {
      content: "";
      position: absolute;
      width: 30%;
      height: 30%;
      top: 20%;
      left: 18%;
      border-radius: 50%;
      background: rgba(255,255,255,0.45);
      filter: blur(1px);
    }

    @keyframes blossom-fall {
      0% {
        transform: translate3d(0, -12vh, 0);
        opacity: 0;
      }
      10% {
        opacity: var(--petal-opacity);
      }
      50% {
        transform: translate3d(calc(var(--drift-x) * 0.45), 52vh, 0);
      }
      100% {
        transform: translate3d(var(--drift-x), 115vh, 0);
        opacity: 0.08;
      }
    }

    @keyframes blossom-spin {
      0% { transform: rotate(0deg) scale(1); }
      50% { transform: rotate(180deg) scale(0.94); }
      100% { transform: rotate(360deg) scale(1); }
    }

    @keyframes blossom-sway {
      0% { margin-left: -8px; }
      100% { margin-left: 8px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .blossom-layer {
        display: none;
      }

      .js .reveal {
        opacity: 1 !important;
        transform: none !important;
        filter: none !important;
        transition: none !important;
      }

      .js .detail-card-7.visible {
        animation: none !important;
      }
    }

    @media (min-width: 769px) {
      .detail-stack {
        max-width: 720px;
      }
    }

    @media (max-width: 1080px) {
      body {
        padding-bottom: 132px;
      }

      .floating-consult-inner {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .floating-consult-title {
        font-size: 20px;
        white-space: normal;
      }

      .floating-consult-form {
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
    }

    @media (max-width: 768px) {
      .container {
        width: min(calc(100% - 24px), var(--max));
      }

      .top-inner {
        padding: 18px 0 38px;
      }

      .top-bar {
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding-bottom: 24px;
      }

      .brand {
        flex: 0 0 auto;
      }

      .top-actions {
        width: auto;
        flex-direction: row;
        align-items: center;
        justify-content: flex-end;
        gap: 8px;
        flex-wrap: nowrap;
      }

      .contact-actions {
        width: 100%;
        flex-direction: column;
        align-items: stretch;
      }

      .top-actions .premium-btn {
        width: auto;
        min-height: 40px;
        padding: 0 12px;
        font-size: 13px;
        gap: 6px;
        border-radius: 14px;
      }

      .top-actions .premium-btn .btn-icon {
        font-size: 12px;
      }

      .premium-btn--large {
        width: 100%;
      }

      .brand-logo {
        height: 52px;
      }

      .hero-sub {
        font-size: 19px;
        margin-top: 18px;
      }

      .hero-note {
        font-size: 16px;
        margin-top: 14px;
      }

  <script>
    (function () {
      const revealItems = document.querySelectorAll('.reveal');
      const alwaysVisible = document.querySelectorAll('.reveal.visible');

      alwaysVisible.forEach((el) => {
        el.dataset.alwaysVisible = '1';
      });

      function applyInitialCheck() {
        revealItems.forEach((el) => {
          if (el.dataset.alwaysVisible === '1') return;

          const rect = el.getBoundingClientRect();
          const inView = rect.top < window.innerHeight * 0.88 && rect.bottom > window.innerHeight * 0.12;

          if (inView) {
            el.classList.add('visible');
          } else {
            el.classList.remove('visible');
          }
        });
      }

      if (!('IntersectionObserver' in window)) {
        applyInitialCheck();
      } else {
        const observer = new IntersectionObserver((entries) => {
          entries.forEach((entry) => {
            const el = entry.target;
            if (el.dataset.alwaysVisible === '1') return;

            if (entry.isIntersecting && entry.intersectionRatio > 0.08) {
              el.classList.add('visible');
            } else {
              const rect = el.getBoundingClientRect();
              const farOut = rect.bottom < window.innerHeight * 0.02 || rect.top > window.innerHeight * 0.98;
              if (farOut) {
                el.classList.remove('visible');
              }
            }
          });
        }, {
          threshold: [0, 0.08, 0.18, 0.35],
          rootMargin: '0px 0px 0px 0px'
        });

        revealItems.forEach((el) => observer.observe(el));
        requestAnimationFrame(applyInitialCheck);
        window.addEventListener('load', applyInitialCheck);
        window.addEventListener('resize', applyInitialCheck);
      }

      const blossomLayer = document.querySelector('.blossom-layer');
      const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      const isMobile = window.innerWidth <= 768;

      if (!blossomLayer || reduceMotion || isMobile) return;

      const totalPetals = 18;

      function random(min, max) {
        return Math.random() * (max - min) + min;
      }

      function createPetal(isInitial) {
        const petal = document.createElement('span');
        const shape = document.createElement('span');

        petal.className = 'blossom-petal';
        shape.className = 'blossom-shape';

        const size = random(10, 20);
        const duration = random(10, 16);
        const delay = isInitial ? -random(0, duration) : 0;
        const drift = random(-120, 120);
        const opacity = random(0.45, 0.88);
        const spin = random(3.4, 6.2);
        const sway = random(2.2, 3.8);

        petal.style.left = `${random(-5, 105)}vw`;
        petal.style.setProperty('--petal-size', `${size}px`);
        petal.style.setProperty('--fall-duration', `${duration}s`);
        petal.style.setProperty('--fall-delay', `${delay}s`);
        petal.style.setProperty('--drift-x', `${drift}px`);
        petal.style.setProperty('--petal-opacity', opacity.toFixed(2));
        shape.style.setProperty('--spin-duration', `${spin}s`);
        shape.style.setProperty('--sway-duration', `${sway}s`);

        petal.appendChild(shape);
        blossomLayer.appendChild(petal);

        petal.addEventListener('animationend', () => {
          petal.remove();
          createPetal(false);
        }, { once: true });
      }

      for (let i = 0; i < totalPetals; i += 1) {
        createPetal(true);
      }
    })();
  </script>

  <script>
    (function () {
      const form = document.getElementById('floatingConsultForm');
      const status = document.getElementById('floatingConsultStatus');

      if (!form || !status) return;

      form.addEventListener('submit', async function (e) {
        e.preventDefault();

        const submitBtn = form.querySelector('.floating-consult-btn');
        const originalText = submitBtn.textContent;

        submitBtn.disabled = true;
        submitBtn.textContent = '전송중...';
        status.textContent = '문의 내용을 전송하고 있습니다.';

        try {
          const response = await fetch(form.action, {
            method: 'POST',
            body: new FormData(form),
            headers: {
              Accept: 'application/json'
            }
          });

          if (response.ok) {
            form.reset();
            status.textContent = '문의가 정상 접수되었습니다. 확인 후 빠르게 연락드리겠습니다.';
          } else {
            status.textContent = '문의 접수 중 문제가 발생했습니다. 잠시 후 다시 시도해주세요.';
          }
        } catch (error) {
          status.textContent = '네트워크 문제로 전송되지 않았습니다. 잠시 후 다시 시도해주세요.';
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = originalText;
        }
      });
    })();
  </script>
